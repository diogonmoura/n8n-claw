version: '3.8'

# Use this when running n8n via Docker (--docker flag in setup.sh)
# n8n data is stored in n8n_data volume

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-claw-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      N8N_SECURE_COOKIE: "false"
      N8N_PORT: "${N8N_PORT:-5678}"
      WEBHOOK_URL: "${N8N_URL}"
      N8N_EDITOR_BASE_URL: "${N8N_URL}"
      N8N_HOST: "${N8N_HOST}"
      N8N_PROTOCOL: https
      N8N_PROXY_HOPS: 1
      N8N_USER_FOLDER: /home/node/.n8n
    volumes:
      - n8n_data:/home/node/.n8n
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - n8n-claw-net

volumes:
  n8n_data:

networks:
  n8n-claw-net:
    external: true
